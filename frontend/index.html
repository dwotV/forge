<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge</title>

  <link rel="icon" type="image/x-icon" href="forge-icon.png">

  <link rel="stylesheet" href="style.css">

  <!-- JetBrains Mono — toda la UI usa mono, es parte de la identidad -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- xterm.js -->
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>

</head>

<body>
<div id="root">

  <!-- ── Topbar ─────────────────────────────────── -->
  <header id="topbar">
    <div class="logo" style="font-family: var(--mono); font-size: 10px; line-height: 1.15; white-space: pre; font-weight: normal; letter-spacing: 0; display: block; padding-top: 2px;">█▀▀ █▀█ █▀█ █▀▀ █▀▀
█▀░ █▄█ █▀▄ █▄█ ██▄</div>
    <span class="sep">|</span>
    <div class="status-pill">
      <div class="dot" id="kali-dot"></div>
      <span id="kali-status">conectando...</span>
    </div>
    <div class="spacer"></div>
     <button id="btn-target" onclick="onTargetButtonClick()" title="Set target">
      [ SET TARGET ]
    </button>
    <button id="btn-gui" onclick="toggleGUI()" title="Show/hide GUI app viewer">
      [ DESKTOP VIEWER ]
    </button>
  </header>

  <!-- ── Sidebar: lanzador de apps ──────────────── -->
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">web &amp; proxy</div>
      <div id="apps-web"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">redes</div>
      <div id="apps-net"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">passwords</div>
      <div id="apps-pass"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">forense &amp; extra</div>
      <div id="apps-other"></div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────── -->
  <main id="main">

    <!-- Panel noVNC (apps GUI) -->
    <div id="gui-panel">
      <iframe id="novnc-frame"
        src="/novnc/vnc.html?autoconnect=1&resize=remote&show_dot=true"
        allow="fullscreen">
      </iframe>
    </div>

    <!-- Cabecera terminal -->
    <div id="term-header">
      <span class="tab">shell — hacker@kali</span>
      <div class="spacer"></div>
      <span class="ws-status" id="ws-label">desconectado</span>
      <button id="btn-reconnect" onclick="connectTerminal()">reconnect</button>
    </div>

    <!-- Terminal xterm.js -->
    <div id="terminal"></div>

  </main>
</div>

<!-- Modal SET TARGET -->
<div id="target-modal-backdrop" onclick="if(event.target===this) closeTargetModal()">
  <div id="target-modal">
    <h3>// SET TARGET</h3>
    <label for="target-host-input">Hostname</label>
    <input id="target-host-input" type="text" placeholder="e.g. dc01.corp.local" autocomplete="off">
    <label for="target-ip-input">IP</label>
    <input id="target-ip-input" type="text" placeholder="e.g. 192.168.1.10" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTargetModal()">[ cancel ]</button>
      <button class="btn-accept" onclick="acceptTarget()">[ accept ]</button>
    </div>
  </div>
</div>

<!-- Toast de notificaciones -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
